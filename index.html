<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>expense-tracker-app</title>
  <!-- Main Style Sheet -->
  <link rel="stylesheet" href="./src/style.css">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
  <!-- main js script -->
  <script type="module" src="/src/main.js" defer></script>
</head>

<body>
  <main>
    <div class="container">
      <div class="main-content-wrapper">
        <section class="dashboard">
          <header>
            <div class="header-content-wrapper | flex">
              <a href="#">
                <svg class="logo">
                  <use xlink:href="../src/assets/images/logo/logo.svg#logo"></use>
                </svg>
              </a>
              <h1 class="text-clr-900 fs-primary-heading uppercase fw-semi-bold">Expense Tracker</h1>
            </div>
          </header>
          <!-- Balance Summary-->
          <div class="balance-summary | flow" style="--flow-spacer:0.7rem">
            <div>
              <h2 class="text-clr-800 fs-secondary-heading capitalize">
                balance summary
              </h2>
            </div>
            <div class="total-balance">
              <p class="capitalize">total balance</p>
              <p class="text-clr-900 fs-800 fw-bold">0/=</p>
            </div>
          </div>
          <!--Total Income & Total Expense -->
          <div>
            <div class=" total-income-and-expense | flex">
              <div>
                <p class="capitalize">total income</p>
                <p class="text-accent-green-400 fs-secondary-heading fw-bold">ksh.300000</p>
              </div>
              <div>
                <p class="capitalize">total expense</p>
                <p class="text-accent-red-400 fs-secondary-heading fw-bold">ksh.300000</p>
              </div>
            </div>
          </div>
        </section>
        <!-- Transaction History -->
        <section class="transaction-history">
          <h2 class="text-clr-900 fs-primary-heading fw-semi-bold capitalize">transaction history</h2>
          <ul class="transaction-history-list" role="list">
            <li class="transaction" data-type="income">
              <div>
                <h3 class="text-clr-900 capitalize fs-secondry-heading fw-semi-bold">salary</h3>
                <p>Mar 20,2026</p>
              </div>
              <p class="amount | fw-bold">+3000000/=</p>
                <div class="delete-icon-wrapper">
                  <svg class="delete-icon">
                    <use xlink:href="../src/assets/images/misc/delete.svg#delete-icon"></use>
                  </svg>
                </div>
              </li>
            <li class="transaction" data-type="expense">
              <div>
                <h3 class="text-clr-900 capitalize fs-secondry-heading fw-semi-bold">tithe</h3>
                <p>Mar 20,2026</p>
              </div>
              <p class="amount | fw-bold">-30000/=</p>
                                <div class="delete-icon-wrapper">
                  <svg class="delete-icon">
                    <use xlink:href="../src/assets/images/misc/delete.svg#delete-icon"></use>
                  </svg>
                </div>              
            </li>
          </ul>
        </section>
      </div>
    </div>
  </main>
</body>

</html>
