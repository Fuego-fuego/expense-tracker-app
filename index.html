<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>expense-tracker-app</title>
  <!-- Main Style Sheet -->
  <link rel="stylesheet" href="./src/style.css">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
  <!-- main js script -->
  <script type="module" src="/src/main.js" defer></script>
</head>
<body>
  <main>
    <div class="container">
      <div class="main-content-wrapper">
      <section class="dashboard">
        <header>
          <div><img src="./src/assets/images/logo/logo-default.svg" alt=""></div>
          <h1 class="fs-primary-heading uppercase fw-bold">Expense Tracker</h1>
        </header>
        <!-- Balance Summary-->
        <div class="balance-summary">
          <div class="flow" style="--flow-spacer:1rem">
            <h2 class="fs-secondary-heading fw-semi-bold capitalize">
              balance  summary 
            </h2>
            <p class="capitalize">total balance</p>
            <p class="fs-800 fw-bold">ksh.o</p>
          </div>
          <!--Total Income & Total Expense -->
          <div>
            <div class="flex">
                <div>
                  <p class="capitalize">total income</p>
                  <p class="text-accent-green-400 fs-secondary-heading fw-bold">ksh.300000</p>
                </div>
                <div>
                  <p class="capitalize">total expense</p>
                  <p class="text-accent-red-400 fs-secondary-heading fw-bold">ksh.300000</p>
                </div>
            </div>            
          </div>
        </div>
      </section>
      <!-- Transaction History -->
      <section class="transaction">
        <h2 class="fs-primary-heading fw-bold capitalize">transaction history</h2>
      <ul class="transaction-history-list">
        <li class="transaction" data-type="income">
          <div>
            <h3 class="capitalize fs-secondry-heading fw-bold">salary</h3>
            <p>3000000/=</p>
            <button class="delete-btn"></button>
          </div>
        </li>
        <li class="transaction" data-type="expense">
          <div>
            <h3 class="capitalize fs-secondry-heading fw-bold">tithe</h3>
            <p>30000/=</p>
            <button class="delete-btn"></button>
          </div>
        </li>
      </ul>
      </section>
      </div>
    </div>    
  </main>
</body>
</html>
