<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>expense-tracker-app</title>
  <!-- Main Style Sheet -->
  <link rel="stylesheet" href="./src/style.css">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
  <!-- main js script -->
  <script type="module" src="/src/main.js" defer></script>
</head>
<body>
  <main>
    <div class="container">
      <div class="main-content-wrapper">
        <section class="dashboard">
          <header>
            <div class="header-content-wrapper | flex">
              <a href="#">
                <svg class="logo">
                  <use xlink:href="../src/assets/images/logo/logo.svg#logo"></use>
                </svg>
              </a>
              <h1 class="text-clr-900 fs-primary-heading uppercase fw-semi-bold">Expense Tracker</h1>
            </div>
          </header>
          <!-- Balance Summary-->
          <div class="balance-summary | flow" style="--flow-spacer:0.7rem">
            <div>
              <h2 class="text-clr-800 fs-secondary-heading capitalize">
                balance summary
              </h2>
            </div>
            <div class="total-balance">
              <p class="capitalize">total balance</p>
              <p class="text-clr-900 fs-800 fw-bold">0/=</p>
            </div>
          </div>
          <!--Total Income & Total Expense -->
          <div>
            <div class=" total-income-and-expense | flex">
              <div>
                <p class="capitalize">total income</p>
                <p class="text-accent-green-400 fs-secondary-heading fw-semi-bold">ksh.300000</p>
              </div>
              <div>
                <p class="capitalize">total expense</p>
                <p class="text-accent-red-400 fs-secondary-heading fw-semi-bold">ksh.300000</p>
              </div>
            </div>
          </div>
          <!-- FORM-->
          <form class="new-transaction-form | flow" action="">
            <!-- Type & Amount  -->
            <h2 class="text-clr-800 fs-secondary-heading capitalize ">
              add new transaction
            </h2>
            <div class="new-transaction-form-group">
              <!-- Type -->
              <div class="new-transaction-form-type-wrapper | new-transaction-form-input-wrapper">
                <label class="capitalize" for="new-transaction-form-type">type</label>
                <select class="new-transaction-form-input  | capitalize" name="new-transaction-form-type"
                  id="new-transaction-form-type">
                  <option value="income">income</option>
                  <option value="expense">expense</option>
                </select>
              </div>
              <!-- Amount -->
              <div class="new-transaction-form-amount-wrapper | new-transaction-form-input-wrapper">
                <label class="capitalize" for="new-transaction-form-amount">amount</label>
                <input class="new-transaction-form-input" type="text" id="new-transaction-form-amount"
                  name="new-transaction-form-amount" placeholder="0/=">
              </div>
            </div>
            <!-- Date & Category  -->
            <div class="new-transaction-form-group">
              <!-- Date -->
              <div class="new-transaction-form-date-wrapper | new-transaction-form-input-wrapper">
                <label class="capitalize" for="new-transaction-form-date">date</label>
                <input class="new-transaction-form-input" type="date" id="new-transaction-form-date"
                  name="new-transaction-form-date">
              </div>
              <!-- Category -->
              <div class="new-transaction-form-category-wrapper | new-transaction-form-input-wrapper">
                <label class="capitalize" for="new-transaction-form-category">category</label>
                <input class="new-transaction-form-input" type="text" id="new-transaction-form-category"
                  name="new-transaction-form-category" placeholder="e.g. Salary, Rent">
              </div>
            </div>
            <!-- Submit Button -->
            <div class="new-transaction-form-submit-btn-wrapper"><input
                class="new-transaction-form-submit-btn | capitalize" type="submit" value="add transaction"></div>
          </form>
        </section>
        <!-- Transaction History -->
        <section class="transaction-history">
          <h2 class="text-clr-900 fs-primary-heading fw-semi-bold capitalize">transaction history</h2>
          <ul class="transaction-history-list" role="list">
            <li class="transaction" data-type="income">
              <div>
                <h3 class="text-clr-900 capitalize fs-secondry-heading fw-semi-bold">salary</h3>
                <p>Mar 20,2026</p>
              </div>
              <p class="amount | fw-bold">+3000000/=</p>
              <div class="delete-icon-wrapper">
                <svg class="delete-icon">
                  <use xlink:href="../src/assets/images/misc/delete.svg#delete-icon"></use>
                </svg>
              </div>
            </li>
            <li class="transaction" data-type="expense">
              <div>
                <h3 class="text-clr-900 capitalize fs-secondry-heading fw-semi-bold">tithe</h3>
                <p>Mar 20,2026</p>
              </div>
              <p class="amount | fw-bold">-30000/=</p>
              <div class="delete-icon-wrapper">
                <svg class="delete-icon">
                  <use xlink:href="../src/assets/images/misc/delete.svg#delete-icon"></use>
                </svg>
              </div>
            </li>
          </ul>
        </section>
      </div>
    </div>
  </main>
  <!-- Footer -->
  <footer class="primary-footer">
    <div class="container">
      <div class="primary-footer-content-wrapper | flex">
        <!-- Logo & Copy right -->
        <div class="primary-footer-logo-copy-right-wrapper | flex">
          <div class="footer-logo-wrapper">
            <a href="#">
              <svg class="logo">
                <use xlink:href="../src/assets/images/logo/logo.svg#logo"></use>
              </svg>
            </a>
          </div>
          <p>&copy; 2026. All rights reserved.</p>
        </div>
        <!-- Social Links -->
        <nav class="footer-social-navigation" aria-labe="social-links-navigation">
          <ul class="footer-social-links | flex" aria-label="social-links-list" role="list">
            <!-- github -->
            <li><a href="#">
                <svg class="footer-social-icon">
                  <use xlink:href="../src/assets/images/social-icons/social.svg#github"></use>
                </svg>
              </a></li>
            <!-- twitter -->
            <li><a href="#">
                <svg class="footer-social-icon">
                  <use xlink:href="../src/assets/images/social-icons/social.svg#twitter"></use>
                </svg>
              </a></li>
            <!-- linkedin -->
            <li><a href="#">
                <svg class="footer-social-icon">
                  <use xlink:href="../src/assets/images/social-icons/social.svg#linkedin"></use>
                </svg>
              </a></li>
            <!-- instagram -->
            <li><a href="#">
                <svg class="footer-social-icon">
                  <use xlink:href="../src/assets/images/social-icons/social.svg#instagram"></use>
                </svg>
              </a></li>
            <!-- youtube -->
            <li><a href="#">
                <svg class="footer-social-icon">
                  <use xlink:href="../src/assets/images/social-icons/social.svg#youtube"></use>
                </svg>
              </a></li>
            <!-- facebook -->
            <li><a href="#">
                <svg class="footer-social-icon">
                  <use xlink:href="../src/assets/images/social-icons/social.svg#facebook"></use>
                </svg>
              </a></li>
          </ul>
        </nav>
      </div>
    </div>

  </footer>
</body>
</html>
